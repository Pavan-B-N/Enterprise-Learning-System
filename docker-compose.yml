version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: els-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: els-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./backend/gateway
    container_name: els-gateway
    ports:
      - "8000:8000"
    environment:
      - CORE_SERVICE_URL=http://core-service:8001
      - ORCHESTRATOR_SERVICE_URL=http://orchestrator:8002
      - ADMIN_SERVICE_URL=http://admin-service:8003
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      core-service:
        condition: service_started
      orchestrator:
        condition: service_started
      admin-service:
        condition: service_started

  core-service:
    build: ./backend/core-service
    container_name: els-core-service
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=enterprise_learning
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - AZURE_SERVICE_BUS_CONNECTION_STRING=${AZURE_SERVICE_BUS_CONNECTION_STRING}
      - REDIS_URL=${REDIS_URL}
      - ADMIN_SERVICE_URL=http://admin-service:8003
    depends_on:
      mongodb:
        condition: service_healthy

  orchestrator:
    build: ./backend/orchestrator
    container_name: els-orchestrator
    ports:
      - "8002:8002"
    environment:
      - CORE_SERVICE_URL=http://core-service:8001
      - FOUNDRY_PROJECT_ENDPOINT=${FOUNDRY_PROJECT_ENDPOINT}
      - FOUNDRY_API_KEY=${FOUNDRY_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - ADMIN_SERVICE_URL=http://admin-service:8003
    depends_on:
      core-service:
        condition: service_started
      redis:
        condition: service_healthy

  admin-service:
    build: ./backend/admin-service
    container_name: els-admin-service
    ports:
      - "8003:8003"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=enterprise_learning
    depends_on:
      mongodb:
        condition: service_healthy

  assessment-service:
    build: ./backend/assessment-service
    container_name: els-assessment-service
    ports:
      - "8004:8004"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DATABASE=enterprise_learning
      - ORCHESTRATOR_URL=http://orchestrator:8002
      - AZURE_SERVICE_BUS_CONNECTION_STRING=${AZURE_SERVICE_BUS_CONNECTION_STRING}
      - ADMIN_SERVICE_URL=http://admin-service:8003
    depends_on:
      mongodb:
        condition: service_healthy
      orchestrator:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: els-frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway

volumes:
  mongo-data:
